<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiDyPari - Welcome</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth magical floating floating logic */
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1.5deg); }
        }
        .animate-pari {
            animation: gentleFloat 6s ease-in-out infinite;
        }

        /* Iridescent pulsing for magical wings */
        @keyframes wingPulse {
            0%, 100% { transform: scale(1); opacity: 0.85; filter: drop-shadow(0 0 10px rgba(244,114,182,0.6)); }
            50% { transform: scale(1.05) rotate(1deg); opacity: 1; filter: drop-shadow(0 0 25px rgba(192,132,252,0.9)); }
        }
        .animate-wings {
            animation: wingPulse 2.5s ease-in-out infinite;
            transform-origin: center;
        }

        /* Natural, cute cartoon eye blink */
        @keyframes cuteBlink {
            0%, 90%, 94%, 98%, 100% { transform: scaleY(1); }
            92%, 96% { transform: scaleY(0.05); }
        }
        .animate-blink {
            animation: cuteBlink 5s ease-in-out infinite;
            transform-origin: center;
        }

        /* Playful bounce for the camera toy */
        @keyframes cameraBounce {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
        }
        .animate-camera {
            animation: cameraBounce 3.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-purple-100 via-sky-100 to-pink-50 h-screen w-screen overflow-hidden font-sans flex flex-col justify-between items-center p-6 select-none">

    <!-- Ambient Magical Glow Particles -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[20%] left-[15%] w-48 h-48 bg-pink-300/30 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute top-[40%] right-[10%] w-64 h-64 bg-purple-300/20 rounded-full blur-3xl animate-pulse" style="animation-duration: 4s;"></div>
    </div>

    <!-- Top Navigation Row -->
    <div class="w-full flex justify-end z-10">
        <button onclick="openParentGate()" class="p-3 bg-white/60 active:scale-95 transition-transform backdrop-blur-xl rounded-2xl shadow-[0_8px_32px_0_rgba(31,38,135,0.05)] border border-white/60">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-purple-500"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </div>

    <!-- PARI: Premium Fairytale Character Design -->
    <div onclick="triggerPariSpeech()" class="animate-pari cursor-pointer relative z-10 flex flex-col items-center justify-center my-auto drop-shadow-[0_20px_35px_rgba(147,51,234,0.15)]">
        
        <svg class="w-64 h-64 relative" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Vibrant Pastel Gradients -->
                <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ec4899"/>
                    <stop offset="50%" stop-color="#a855f7"/>
                    <stop offset="100%" stop-color="#6366f1"/>
                </linearGradient>
                <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.7"/>
                    <stop offset="50%" stop-color="#f472b6" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0.8"/>
                </linearGradient>
                <linearGradient id="dressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#f472b6"/>
                    <stop offset="100%" stop-color="#c084fc"/>
                </linearGradient>
                <linearGradient id="wandGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffe4e6"/>
                    <stop offset="100%" stop-color="#fcd34d"/>
                </linearGradient>
            </defs>

            <!-- Layered Soft Wings with continuous magical pulse -->
            <g class="animate-wings">
                <!-- Top Left Wing -->
                <path d="M95 75 C45 15, 15 40, 35 85 C48 115, 80 95, 95 90" fill="url(#wingGrad)"/>
                <!-- Top Right Wing -->
                <path d="M105 75 C155 15, 185 40, 165 85 C152 115, 120 95, 105 90" fill="url(#wingGrad)"/>
                <!-- Bottom Soft Wing Flaps -->
                <path d="M95 95 C65 105, 50 135, 80 135 C92 135, 95 110, 95 95" fill="url(#wingGrad)" opacity="0.6"/>
                <path d="M105 95 C135 105, 150 135, 120 135 C108 135, 105 110, 105 95" fill="url(#wingGrad)" opacity="0.6"/>
            </g>

            <!-- Star Sparkle Wand -->
            <path d="M132 112 L170 65" stroke="#fcd34d" stroke-width="3" stroke-linecap="round" filter="drop-shadow(0 0 4px #fbbf24)"/>
            <path d="M170 57 L173 63 L179 64 L175 69 L176 75 L170 72 L164 75 L165 69 L161 64 L167 63 Z" fill="url(#wandGlow)" filter="drop-shadow(0 0 8px #f59e0b)"/>

            <!-- Elegant Princess Gown Layering -->
            <path d="M78 115 C78 115, 62 165, 58 172 C54 180, 64 182, 100 182 C136 182, 146 180, 142 172 C138 165, 122 115, 122 115 Z" fill="url(#dressGrad)"/>
            <path d="M86 115 Q100 126 114 115 L108 98 L92 98 Z" fill="#fff" opacity="0.9"/>

            <!-- Cheerful Face & Features -->
            <circle cx="100" cy="72" r="23" fill="#ffedd5"/>
            
            <!-- Beautiful Sparkling Anime Eyes -->
            <g>
                <!-- Left Eye Structure -->
                <circle cx="91" cy="71" r="4.5" fill="#1e1b4b"/>
                <circle cx="89.5" cy="69" r="1.5" fill="#fff"/> <!-- Highlight -->
                <circle cx="92.5" cy="73" r="0.8" fill="#fff"/>
                <!-- Right Eye Structure -->
                <circle cx="109" cy="71" r="4.5" fill="#1e1b4b"/>
                <circle cx="107.5" cy="69" r="1.5" fill="#fff"/> <!-- Highlight -->
                <circle cx="110.5" cy="73" r="0.8" fill="#fff"/>
                
                <!-- Happy Rosy Cheeks Blush -->
                <circle cx="84" cy="77" r="3.5" fill="#f43f5e" opacity="0.4" filter="blur(1px)"/>
                <circle cx="116" cy="77" r="3.5" fill="#f43f5e" opacity="0.4" filter="blur(1px)"/>
                
                <!-- Adorable Smile -->
                <path d="M96 79 Q100 84 104 79" stroke="#be123c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </g>

            <!-- Flowing Magical Pastel Hair (Replaces blocky gray structure) -->
            <path d="M72 74 C65 42, 135 42, 128 74 C134 94, 126 122, 126 122 C116 100, 84 100, 74 122 C74 122, 66 94, 72 74" fill="url(#hairGrad)"/>
            <!-- Elegant Side-swept Bangs detailing -->
            <path d="M75 62 Q100 52 125 62 Q105 74 96 74 Z" fill="url(#hairGrad)" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.15))"/>
            <!-- Fluffy Princess Hair Buns -->
            <circle cx="100" cy="45" r="11" fill="url(#hairGrad)"/>
            <path d="M88 48 Q100 42 112 48" stroke="#f472b6" stroke-width="3" fill="none"/> <!-- Tiara Base -->
        </svg>

        <!-- Dynamic Label Capsule -->
        <span class="mt-4 px-5 py-2 bg-white/80 backdrop-blur-xl border border-purple-200 text-purple-600 font-bold text-xs rounded-full tracking-wider shadow-sm uppercase">
            ✨ Tap Me to Talk ✨
        </span>
    </div>

    <!-- CAMERA: Premium Adorable 3D Toy Character Design -->
    <div class="w-full flex justify-center pb-10 z-10">
        <button onclick="triggerPariSpeech()" class="animate-camera group relative focus:outline-none">
            
            <!-- Toy Gadget Body Shell -->
            <div class="w-56 h-42 bg-gradient-to-br from-coral-400 via-orange-400 to-amber-400 rounded-[46px] border-b-[10px] border-orange-600/80 flex flex-col items-center justify-between p-4 relative shadow-[0_25px_50px_-12px_rgba(249,115,22,0.4)] transition-all duration-200 active:scale-95 active:border-b-[2px] active:translate-y-2">
                
                <!-- Premium Color Accents / Toy Shutter Grip -->
                <div class="absolute -top-3.5 left-12 w-14 h-5 bg-amber-300 rounded-t-2xl shadow-inner border-t border-white/40"></div>
                <div class="absolute -top-3 right-14 w-12 h-4 bg-rose-500 rounded-t-xl active:bg-rose-600 border-b-2 border-rose-700 shadow-sm"></div>

                <!-- Adorable Big Expressive Eyes (Clean Blinking Interaction Container) -->
                <div class="w-full flex justify-around px-8 pt-2">
                    <g class="animate-blink">
                        <!-- Left Toy Eye -->
                        <div class="animate-blink w-11 h-11 bg-white rounded-full flex items-center justify-center shadow-[inset_0_4px_8px_rgba(0,0,0,0.15)]">
                            <div class="w-6 h-6 bg-slate-900 rounded-full relative flex items-center justify-center">
                                <div class="absolute top-0.5 left-0.5 w-2.5 h-2.5 bg-white rounded-full"></div>
                                <div class="absolute bottom-1 right-1 w-1 h-1 bg-white rounded-full opacity-70"></div>
                            </div>
                        </div>
                    </g>
                    <g class="animate-blink">
                        <!-- Right Toy Eye -->
                        <div class="animate-blink w-11 h-11 bg-white rounded-full flex items-center justify-center shadow-[inset_0_4px_8px_rgba(0,0,0,0.15)]">
                            <div class="w-6 h-6 bg-slate-900 rounded-full relative flex items-center justify-center">
                                <div class="absolute top-0.5 left-0.5 w-2.5 h-2.5 bg-white rounded-full"></div>
                                <div class="absolute bottom-1 right-1 w-1 h-1 bg-white rounded-full opacity-70"></div>
                            </div>
                        </div>
                    </g>
                </div>

                <!-- Glassy High-End Camera Lens Element -->
                <div class="w-24 h-24 bg-white rounded-full p-2 shadow-[0_8px_16px_rgba(0,0,0,0.1)] relative -mt-3 flex items-center justify-center">
                    <div class="w-full h-full bg-slate-900 rounded-full p-1.5 flex items-center justify-center relative overflow-hidden">
                        <!-- Iridescent Camera Flare Ring -->
                        <div class="w-full h-full bg-gradient-to-tr from-cyan-500 via-blue-600 to-indigo-500 rounded-full flex items-center justify-center relative">
                            <!-- Beautiful Mirror Refraction Glare -->
                            <div class="absolute top-1 left-2 w-7 h-4 bg-white/40 rounded-full rotate-[-25deg] filter blur-[0.5px]"></div>
                            <div class="absolute bottom-2 right-3 w-3 h-1.5 bg-white/20 rounded-full rotate-[-25deg]"></div>
                            <!-- Core Aperture Shutter -->
                            <div class="w-7 h-7 bg-slate-950 rounded-full border border-cyan-300/40 shadow-inner"></div>
                        </div>
                    </div>
                </div>

                <!-- Sweet Toy Face Mouth Line -->
                <div class="pb-1.5">
                    <svg width="36" height="14" viewBox="0 0 36 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 2 C10 13, 26 13, 33 2" stroke="#4a1d12" stroke-width="4.5" stroke-linecap="round" fill="none"/>
                    </svg>
                </div>

            </div>

            <!-- Soft Radial Floor shadow under the floating widget -->
            <div class="absolute -bottom-2 left-6 right-6 h-4 bg-orange-900/10 rounded-full blur-md -z-10 group-hover:scale-105 transition-transform duration-300"></div>
        </button>
    </div>

    <!-- Core App Logic Engine -->
    <script>
        function triggerPariSpeech() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();

                const speechText = "Hi Shubh! Welcome to your magic world! Let's scan a page from your textbook to start playing, tap the big camera button!";
                const utterance = new SpeechSynthesisUtterance(speechText);

                utterance.pitch = 1.4; 
                utterance.rate = 0.95; 

                window.speechSynthesis.speak(utterance);
            }
            alert("✨ Pari says: Camera Scanning Mode Active! Let's snap a book page.");
        }

        function openParentGate() {
            alert("🔒 Parent Security Lock Gate Active: Solve challenge to customize dialects.");
        }
    </script>
</body>
                        </html>
