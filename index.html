<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiDyPari - Welcome</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Magical organic floating animation for Pari */
        @keyframes magicalFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(3deg); }
        }
        .animate-pari {
            animation: magicalFloat 5s ease-in-out infinite;
        }

        /* Fluttering effect for Pari's wings */
        @keyframes wingFlutter {
            0%, 100% { transform: scaleX(1); opacity: 0.8; }
            50% { transform: scaleX(0.75) skewY(4deg); opacity: 1; filter: drop-shadow(0 0 15px rgba(244,114,182,0.8)); }
        }
        .animate-wings {
            animation: wingFlutter 0.6s ease-in-out infinite;
            transform-origin: center;
        }

        /* Cartoon Camera Blinking Eyes */
        @keyframes eyeBlink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }
        .animate-blink {
            animation: eyeBlink 4s infinite;
        }

        /* 3D Floating / Bouncing effect for the cartoon camera */
        @keyframes cameraFloat {
            0%, 100% { transform: translateY(0px) scale(1); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
            50% { transform: translateY(-12px) scale(1.03); box-shadow: 0 35px 30px -10px rgba(249,115,22,0.3), 0 20px 20px -10px rgba(249,115,22,0.2); }
        }
        .animate-camera {
            animation: cameraFloat 3s ease-in-out infinite;
        }

        /* Parallax cloud speeds */
        @keyframes drift-slow {
            0% { transform: translateX(-108%); }
            100% { transform: translateX(108vw); }
        }
        .cloud-1 { animation: drift-slow 45s linear infinite; }
        .cloud-2 { animation: drift-slow 65s linear infinite; animation-delay: -20s; }
    </style>
</head>
<body class="bg-gradient-to-b from-sky-200 via-blue-100 to-emerald-50 h-screen w-screen overflow-hidden font-sans flex flex-col justify-between items-center p-6 select-none">

    <!-- Decorative Animated Background Clouds -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="cloud-1 absolute top-[15%] left-0 opacity-80 w-32 h-12 bg-white rounded-full blur-[1px]"></div>
        <div class="cloud-2 absolute top-[35%] left-0 opacity-60 w-40 h-14 bg-white rounded-full blur-[2px]"></div>
    </div>

    <!-- Top Action Row (Settings / Parent Gate) -->
    <div class="w-full flex justify-end z-10">
        <button onclick="openParentGate()" class="p-3.5 bg-white/70 active:scale-95 transition-transform backdrop-blur-md rounded-2xl shadow-sm border border-white/40">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-600"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </div>

    <!-- MAIN CHARACTER AREA: Free-Standing Animated Pari -->
    <div onclick="triggerPariSpeech()" class="animate-pari cursor-pointer relative z-10 flex flex-col items-center justify-center my-auto drop-shadow-[0_15px_20px_rgba(168,85,247,0.2)]">
        
        <!-- Magical Glowing Background Aura -->
        <div class="absolute w-72 h-72 bg-gradient-to-r from-pink-300/40 via-purple-300/40 to-cyan-300/40 rounded-full blur-3xl scale-125 pointer-events-none"></div>
        
        <!-- Interactive Vector Fairy Character Canvas -->
        <svg class="w-64 h-64 relative" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Animated Fluttering Wings Background -->
            <g class="animate-wings">
                <!-- Left Wing -->
                <path d="M90 80 C40 20, 10 50, 30 90 C45 120, 80 100, 90 95" fill="url(#pinkGrad)" opacity="0.85"/>
                <!-- Right Wing -->
                <path d="M110 80 C160 20, 190 50, 170 90 C155 120, 120 100, 110 95" fill="url(#pinkGrad)" opacity="0.85"/>
                <!-- Lower Tiny Wings -->
                <path d="M92 100 C60 110, 50 140, 80 140 C90 140, 92 115, 92 100" fill="url(#cyanGrad)" opacity="0.7"/>
                <path d="M108 100 C140 110, 150 140, 120 140 C110 140, 108 115, 108 100" fill="url(#cyanGrad)" opacity="0.7"/>
            </g>

            <!-- Fairy Body & Dress -->
            <!-- Golden Magic Wand -->
            <path d="M130 110 L165 75" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
            <polygon points="165 67 169 74 176 74 171 79 173 86 165 81 157 86 159 79 154 74 161 74" fill="#FCD34D"/>
            
            <!-- Princess Dress -->
            <path d="M85 105 L115 105 L135 160 L65 160 Z" fill="url(#purpleGrad)"/>
            <path d="M85 105 C100 115, 100 115, 115 105 L108 90 L92 90 Z" fill="#D8B4FE"/>

            <!-- Head & Beautiful Features -->
            <circle cx="100" cy="70" r="22" fill="#FED7AA"/> <!-- Face -->
            
            <!-- Flowing Magical Hair -->
            <path d="M74 70 C70 40, 130 40, 126 70 C132 85, 125 100, 125 100 C115 85, 85 85, 75 100 C75 100, 68 85, 74 70" fill="#475569"/>
            <circle cx="100" cy="50" r="10" fill="#475569"/> <!-- Hair Bun -->
            <path d="M90 50 Q100 45 110 50" stroke="#F472B6" stroke-width="4" fill="none"/> <!-- Tiara -->

            <!-- Cute Facial Expressions -->
            <circle cx="93" cy="70" r="2.5" fill="#1E293B"/> <!-- Left Eye -->
            <circle cx="107" cy="70" r="2.5" fill="#1E293B"/> <!-- Right Eye -->
            <path d="M96 78 Q100 84 104 78" stroke="#E11D48" stroke-width="2.5" fill="none" stroke-linecap="round"/> <!-- Happy Smile -->
            <circle cx="88" cy="74" r="3" fill="#F472B6" opacity="0.6"/> <!-- Blush Left -->
            <circle cx="112" cy="74" r="3" fill="#F472B6" opacity="0.6"/> <!-- Blush Right -->

            <!-- Gradients Definition -->
            <defs>
                <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#F472B6"/>
                    <stop offset="100%" stop-color="#FB7185"/>
                </linearGradient>
                <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#A855F7"/>
                    <stop offset="100%" stop-color="#6366F1"/>
                </linearGradient>
                <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#22D3EE"/>
                    <stop offset="100%" stop-color="#818CF8"/>
                </linearGradient>
            </defs>
        </svg>

        <!-- Sparkle Label -->
        <span class="mt-2 px-4 py-1.5 bg-purple-500/10 backdrop-blur-md border border-purple-300/30 text-purple-600 font-bold text-sm rounded-full tracking-wide">
            ✨ Tap Pari To Talk ✨
        </span>
    </div>

    <!-- BOTTOM INTERACTIVE AREA: Giant Expressive Cartoon Camera -->
    <div class="w-full flex justify-center pb-8 z-10">
        <button onclick="triggerPariSpeech()" class="animate-camera group relative focus:outline-none">
            
            <!-- Outer Cartoon Camera Body Structure -->
            <div class="w-56 h-44 bg-gradient-to-br from-amber-400 via-orange-400 to-amber-500 rounded-[42px] border-b-8 border-orange-600 flex flex-col items-center justify-between p-4 relative shadow-2xl transition-all duration-200 active:scale-95 active:border-b-2 active:translate-y-1">
                
                <!-- Top Camera Flash & Shutter Buttons -->
                <div class="absolute -top-4 left-10 w-12 h-5 bg-amber-300 rounded-t-xl border-t-2 border-white/40"></div>
                <div class="absolute -top-3 right-12 w-14 h-4 bg-rose-500 rounded-t-lg active:bg-rose-600 shadow-sm"></div>

                <!-- Expressive Blinking Eyes Row -->
                <div class="w-full flex justify-around px-6 pt-2">
                    <!-- Left Eye -->
                    <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center relative shadow-inner">
                        <div class="animate-blink w-4 h-4 bg-slate-900 rounded-full relative">
                            <div class="absolute top-0.5 left-0.5 w-1.5 h-1.5 bg-white rounded-full"></div> <!-- Eye Highlight -->
                        </div>
                    </div>
                    <!-- Right Eye -->
                    <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center relative shadow-inner">
                        <div class="animate-blink w-4 h-4 bg-slate-900 rounded-full relative">
                            <div class="absolute top-0.5 left-0.5 w-1.5 h-1.5 bg-white rounded-full"></div> <!-- Eye Highlight -->
                        </div>
                    </div>
                </div>

                <!-- Giant Toy Lens / Big Beautiful Camera Eye Center -->
                <div class="w-24 h-24 bg-slate-800 rounded-full border-8 border-white flex items-center justify-center shadow-lg relative -mt-2">
                    <!-- Deep Lens Reflective Glare -->
                    <div class="w-16 h-16 bg-gradient-to-tr from-cyan-600 via-blue-500 to-teal-400 rounded-full flex items-center justify-center relative overflow-hidden">
                        <div class="absolute top-1 left-2 w-6 h-3 bg-white/40 rounded-full rotate-[-30deg]"></div>
                        <!-- Inner Shutter Eye -->
                        <div class="w-8 h-8 bg-slate-950 rounded-full border-2 border-cyan-300/50"></div>
                    </div>
                </div>

                <!-- Cute Animated Smile Mouth -->
                <div class="pb-1">
                    <svg width="34" height="16" viewBox="0 0 34 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 2 C10 16, 24 16, 32 2" stroke="#451a03" stroke-width="4" stroke-linecap="round" fill="#f43f5e"/>
                    </svg>
                </div>

            </div>

            <!-- Ringing Glow Ring Under Character -->
            <div class="absolute inset-0 bg-orange-400/20 rounded-[42px] blur-xl -z-10 opacity-70 group-hover:opacity-100 transition-opacity"></div>
        </button>
    </div>

    <!-- Script Processing Engine -->
    <script>
        // Native audio speech synthesizer engine
        function triggerPariSpeech() {
            if ('speechSynthesis' in window) {
                // Terminate background speech loops
                window.speechSynthesis.cancel();

                const speechText = "Hi Shubh! Welcome to your magic world! Let's scan a page from your textbook to start playing, tap the big camera button!";
                const utterance = new SpeechSynthesisUtterance(speechText);

                // Child-friendly cartoon sound modeling
                utterance.pitch = 1.4; 
                utterance.rate = 0.95; 

                window.speechSynthesis.speak(utterance);
            }

            // Pop-up interaction banner trigger
            alert("✨ Pari says: Camera Scanning Mode Active! Let's snap a book page.");
        }

        function openParentGate() {
            alert("🔒 Parent Security Lock Gate Active: Solve challenge to customize dialects.");
        }
    </script>
</body>
</html>
