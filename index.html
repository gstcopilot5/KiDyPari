<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiDyPari - Welcome</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth floating animation for Pari */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        /* Organic pulsing squash/stretch for the core camera button */
        @keyframes playful-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06) skewX(-2deg); }
        }
        .animate-playful {
            animation: playful-pulse 2.5s ease-in-out infinite;
        }
        /* Parallax cloud speeds */
        @keyframes drift-slow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100vw); }
        }
        .cloud-1 { animation: drift-slow 40s linear infinite; }
        .cloud-2 { animation: drift-slow 60s linear infinite; animation-delay: -20s; }
    </style>
</head>
<body class="bg-gradient-to-b from-sky-200 via-blue-100 to-emerald-50 h-screen w-screen overflow-hidden font-sans flex items-center justify-center select-none antialiased">

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="cloud-1 absolute top-[15%] left-0 opacity-60 w-32 h-12 bg-white rounded-full blur-[1px] before:content-[''] before:absolute before:bg-white before:w-16 before:h-16 before:rounded-full before:-top-6 before:left-6 after:content-[''] after:absolute after:bg-white after:w-20 after:h-20 after:rounded-full after:-top-10 after:left-16"></div>
        <div class="cloud-2 absolute top-[35%] left-0 opacity-40 w-40 h-14 bg-white rounded-full blur-[2px] before:content-[''] before:absolute before:bg-white before:w-20 before:h-20 before:rounded-full before:-top-8 before:left-8 after:content-[''] after:absolute after:bg-white after:w-24 after:h-24 after:rounded-full after:-top-12 after:left-20"></div>
    </div>

    <div class="relative w-full max-w-md h-full flex flex-col justify-between items-center p-8 z-10">
        
        <div class="w-full flex justify-end">
            <button onclick="openParentGate()" class="p-3 bg-white/60 active:scale-95 transition-transform backdrop-blur-md rounded-2xl shadow-sm border border-white/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>

        <div class="flex flex-col items-center justify-center my-auto animate-float">
            <div class="relative w-48 h-48 flex items-center justify-center">
                <div class="absolute w-36 h-36 bg-gradient-to-tr from-pink-400 via-purple-400 to-indigo-300 rounded-full shadow-lg opacity-90 flex items-center justify-center border-4 border-white">
                    <span class="text-5xl">🧚‍♀️</span>
                </div>
                <div class="absolute -left-4 w-20 h-28 bg-pink-300/40 rounded-full blur-[2px] transform -rotate-45 -z-10 animate-pulse"></div>
                <div class="absolute -right-4 w-20 h-28 bg-pink-300/40 rounded-full blur-[2px] transform rotate-45 -z-10 animate-pulse"></div>
            </div>
        </div>

        <div class="w-full flex flex-col items-center gap-6 pb-12">
            <button onclick="triggerPariSpeech()" class="animate-playful w-32 h-32 bg-gradient-to-r from-amber-400 to-orange-400 rounded-full shadow-[0_12px_24px_rgba(234,179,8,0.4)] border-8 border-white flex items-center justify-center active:scale-90 active:duration-75 transition-all cursor-pointer group">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 stroke-white fill-none" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            </button>
        </div>

    </div>

    <script>
        // Use browser native audio system to say our greeting out loud in structural Banglish synthesis
        function triggerPariSpeech() {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing talking loops
                window.speechSynthesis.cancel();
                
                const speechText = "Hi Shubh! Welcome to your magic world!  Let's scan a page from your textbook to start playing. Tap the big camera button!";
                const utterance = new SpeechSynthesisUtterance(speechText);
                
                // Fine tune speech characteristics for standard friendly presentation patterns
                utterance.pitch = 1.4; // Sweet kid-friendly pitch inflection
                utterance.rate = 0.95; // Slightly slower, pacing for nursery retention layouts
                
                window.speechSynthesis.speak(utterance);
            }
            
            // Temporary trigger alert notification to show the hardware module interaction state
            alert("✨ Pari says: Camera Scanning Mode Active! Let's snap a book page.");
        }

        function openParentGate() {
            alert("🔒 Parent Security Lock Gate Active: Solve challenge to customize dialects.");
        }
    </script>
</body>
</html>
