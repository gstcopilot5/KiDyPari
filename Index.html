<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KiddyPari — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* cooler blue-teal-green sky so pink/purple Pari pops */
    --sky-top:#57a3e6; --sky-mid:#79cfd0; --sky-low:#cdeec7; --sky-glow:#fff0c8;
    --gold:#ffcf5c; --pink:#ff87b6; --purple:#a982f0; --mint:#7fe0c0;
    --grass:#84d488; --grass-deep:#3f9a54; --ink:#33406b;
    --font-display:'Fredoka','Baloo 2',system-ui,sans-serif;
    --font-body:'Nunito',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:var(--font-body);
    background:
      radial-gradient(120% 80% at 76% 12%, var(--sky-glow) 0%, transparent 46%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-low) 100%);
    position:relative;user-select:none;touch-action:manipulation;
    display:flex;flex-direction:column;align-items:center;}

  /* ---------- SCENE ---------- */
  .scene{position:fixed;inset:0;overflow:hidden;z-index:0;}
  .sun{position:absolute;top:-100px;right:-80px;width:360px;height:360px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,246,214,.95) 0%, rgba(255,216,150,.4) 42%, transparent 70%);
    animation:sunBreathe 13s ease-in-out infinite;}
  @keyframes sunBreathe{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.05);opacity:1}}
  .rays{position:absolute;top:-120px;right:-120px;width:520px;height:520px;opacity:.13;
    animation:spinSlow 90s linear infinite;transform-origin:center;}
  @keyframes spinSlow{to{transform:rotate(360deg)}}

  /* soft light behind Pari to separate her from the sky */
  .backlight{position:absolute;left:50%;top:43%;width:min(92vw,440px);height:min(92vw,440px);
    transform:translate(-50%,-50%);border-radius:50%;z-index:0;
    background:radial-gradient(circle, rgba(255,255,255,.6) 0%, rgba(255,255,255,.18) 40%, transparent 68%);}
  .rainbow{position:absolute;bottom:17vh;left:-8%;width:min(82vw,500px);height:auto;opacity:.32;z-index:0;pointer-events:none;}

  .stars,.petals{position:absolute;inset:0;pointer-events:none;}
  .star{position:absolute;background:#fff;border-radius:50%;box-shadow:0 0 6px rgba(255,255,255,.9);
    animation:twinkle 5s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:1;transform:scale(1.15)}}
  .petal{position:absolute;top:-24px;width:15px;height:12px;border-radius:14px 3px 14px 3px;
    background:linear-gradient(135deg,#ffd6ea,#ff9ec6);opacity:.9;animation:petalFall linear infinite;}
  @keyframes petalFall{0%{transform:translate(0,0) rotate(0);opacity:0}10%{opacity:.9}90%{opacity:.9}
    100%{transform:translate(var(--drift,40px),106vh) rotate(420deg);opacity:0}}

  .hills{position:absolute;bottom:19vh;left:0;width:100%;opacity:.6;}
  .cloud{position:absolute;filter:drop-shadow(0 12px 16px rgba(70,90,140,.14));}
  .cloud.c1{top:15%;left:-20%;width:250px;animation:cloudMove 95s linear infinite;}
  .cloud.c2{top:31%;left:-32%;width:160px;opacity:.92;animation:cloudMove 130s linear infinite;animation-delay:-55s;}
  .cloud.c3{top:10%;left:-24%;width:130px;opacity:.8;animation:cloudMove 160s linear infinite;animation-delay:-100s;}
  @keyframes cloudMove{from{transform:translateX(0)}to{transform:translateX(135vw)}}

  .island{position:absolute;top:40%;left:6%;width:120px;
    filter:drop-shadow(0 16px 20px rgba(60,80,130,.22));animation:bob 11s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-14px) rotate(1deg)}}

  .ground{position:absolute;bottom:0;left:0;width:100%;height:25vh;z-index:1;}
  .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%, transparent 55%, rgba(40,60,110,.18) 100%);}

  /* ---------- STAGE ---------- */
  .stage{position:relative;z-index:5;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 14px) 18px calc(env(safe-area-inset-bottom) + 18px);}
  .topbar{width:100%;display:flex;justify-content:flex-end;}
  .gear{width:52px;height:52px;display:grid;place-items:center;border-radius:18px;
    background:rgba(255,255,255,.45);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.65);
    box-shadow:0 10px 26px rgba(50,60,110,.2);color:#3f6ab0;cursor:pointer;transition:transform .15s ease;}
  .gear:active{transform:scale(.92) rotate(30deg);}
  .gear svg{width:24px;height:24px;}

  /* ---------- PARI ---------- */
  .pari-wrap{margin:auto 0;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;
    animation:pariIn 1.1s cubic-bezier(.2,.9,.25,1) both;}
  @keyframes pariIn{from{opacity:0;transform:translateY(24px) scale(.92)}to{opacity:1;transform:none}}
  .pari-float{animation:pariFloat 7s ease-in-out infinite;filter:drop-shadow(0 20px 28px rgba(40,50,110,.3));}
  @keyframes pariFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-12px) rotate(.7deg)}}
  .pari-svg{width:min(78vw,320px);height:auto;display:block;overflow:visible;}
  .pari-wrap:active .pari-float{transform:scale(.97);}

  .wingL,.wingR{transform-box:fill-box;}
  .wingL{transform-origin:88% 50%;animation:wingL 3.8s ease-in-out infinite;}
  .wingR{transform-origin:12% 50%;animation:wingR 3.8s ease-in-out infinite;}
  @keyframes wingL{0%,100%{transform:rotate(0)}50%{transform:rotate(-8deg)}}
  @keyframes wingR{0%,100%{transform:rotate(0)}50%{transform:rotate(8deg)}}
  .wing-glow{animation:wingGlow 4s ease-in-out infinite;}
  @keyframes wingGlow{0%,100%{opacity:.5}50%{opacity:.85}}

  .eyes{transform-box:fill-box;transform-origin:center;animation:blink 5.6s ease-in-out infinite;}
  @keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
  .aura{transform-box:fill-box;transform-origin:center;animation:auraPulse 6s ease-in-out infinite;}
  @keyframes auraPulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.85;transform:scale(1.06)}}
  .orbit{transform-box:fill-box;transform-origin:center;animation:spinSlow 34s linear infinite;}
  .twinkle-s{animation:twinkle 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  .gemglow{animation:wingGlow 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}

  .bubble{position:absolute;top:-8px;left:50%;transform:translate(-50%,-100%) scale(.6);
    max-width:270px;background:#fff;color:var(--ink);font-family:var(--font-display);font-weight:600;
    font-size:16px;line-height:1.35;padding:14px 18px;border-radius:22px;text-align:center;
    box-shadow:0 14px 30px rgba(50,60,120,.24);opacity:0;pointer-events:none;
    border:2px solid rgba(120,170,240,.5);z-index:6;}
  .bubble::after{content:"";position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
    border:9px solid transparent;border-top-color:#fff;}
  .bubble.show{animation:bubblePop .4s cubic-bezier(.2,1.3,.4,1) forwards;}
  @keyframes bubblePop{to{opacity:1;transform:translate(-50%,-100%) scale(1)}}

  /* ---------- CAMERA (pink+green+blue+black+purple+yellow) ---------- */
  .cam-wrap{width:100%;display:flex;justify-content:center;padding-bottom:8px;
    animation:camIn 1.1s .3s cubic-bezier(.2,.9,.25,1) both;}
  @keyframes camIn{from{opacity:0;transform:translateY(30px) scale(.9)}to{opacity:1;transform:none}}
  .cam{position:relative;border:none;background:none;cursor:pointer;
    animation:camWobble 6s ease-in-out infinite;filter:drop-shadow(0 20px 26px rgba(60,50,120,.35));}
  @keyframes camWobble{0%,100%{transform:translateY(0) rotate(-1.2deg)}50%{transform:translateY(-7px) rotate(1.2deg)}}
  .cam-body{width:min(72vw,260px);aspect-ratio:4/3;border-radius:16px;position:relative;
    background:linear-gradient(180deg,#6ccbf6 0%,#4fb0ea 100%);
    border:3px solid #17121f;border-bottom:9px solid #17121f;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:14px 16px 12px;transition:transform .12s ease;}
  .cam-body::before{content:"";position:absolute;inset:0;pointer-events:none;border-radius:14px;
    background:radial-gradient(120% 60% at 30% 10%, rgba(255,255,255,.4), transparent 55%);}
  .cam:active .cam-body{transform:scale(.96) translateY(3px);}
  .grip{position:absolute;top:-16px;left:20%;width:42%;height:22px;border-radius:13px 13px 0 0;
    background:#2fbcaa;border:3px solid #17121f;border-bottom:none;}
  .shutter{position:absolute;top:-14px;right:15%;width:42px;height:18px;border-radius:11px 11px 0 0;
    background:#ff9e3d;border:3px solid #17121f;border-bottom:none;}
  .flash-bulb{position:absolute;top:-11px;left:56%;width:24px;height:15px;border-radius:8px 8px 0 0;
    background:#ff6fa8;border:3px solid #17121f;border-bottom:none;}
  .cam-dot{position:absolute;top:20%;left:12%;width:16px;height:16px;border-radius:50%;
    background:#ffd447;border:2.5px solid #17121f;z-index:3;}
  .cam-cheek{position:absolute;bottom:19%;width:26px;height:15px;border-radius:50%;
    background:#ff8ab8;opacity:.7;filter:blur(.5px);z-index:2;}
  .cam-cheek.l{left:9%;} .cam-cheek.r{right:9%;}
  .cam-eyes{width:100%;display:flex;justify-content:space-around;padding:2px 22px 0;z-index:2;}
  .cam-eye{width:36px;height:36px;background:#fff;border-radius:50%;display:grid;place-items:center;
    border:2.5px solid #17121f;animation:blink 5s ease-in-out infinite;}
  .cam-pupil{width:17px;height:17px;background:#17121f;border-radius:50%;position:relative;}
  .cam-pupil::before{content:"";position:absolute;top:3px;left:3px;width:8px;height:8px;background:#fff;border-radius:50%;}
  .lens{width:46%;aspect-ratio:1;border-radius:50%;background:#ff5fa8;margin-top:-2px;z-index:2;
    box-shadow:0 8px 16px rgba(0,0,0,.2);position:relative;overflow:hidden;border:4px solid #17121f;
    display:grid;place-items:center;}
  .lens-inner{width:76%;height:76%;border-radius:50%;background:#ffcf5c;
    display:grid;place-items:center;position:relative;overflow:hidden;}
  .lens-inner::after{content:"";position:absolute;inset:0;
    background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,.85) 50%,transparent 60%);
    transform:translateX(-120%);animation:glint 6s ease-in-out infinite;}
  @keyframes glint{0%,60%{transform:translateX(-120%)}82%,100%{transform:translateX(120%)}}
  .aperture{width:58%;height:58%;aspect-ratio:1;background:#12224a;border-radius:50%;position:relative;
    box-shadow:0 0 0 6px #2fc0a8;}
  .aperture::before{content:"";position:absolute;top:16%;left:18%;width:26%;height:26%;
    background:#fff;border-radius:50%;}
  .cam-mouth{margin-top:6px;z-index:2;}

  /* ---------- OVERLAYS ---------- */
  .flash{position:fixed;inset:0;background:#fff;opacity:0;z-index:40;pointer-events:none;}
  .flash.go{animation:flash .5s ease-out;}
  @keyframes flash{0%{opacity:0}18%{opacity:.9}100%{opacity:0}}
  .sparkle{position:fixed;z-index:35;pointer-events:none;animation:sparkleFly .9s ease-out forwards;will-change:transform,opacity;}
  @keyframes sparkleFly{0%{transform:translate(-50%,-50%) scale(.3) rotate(0);opacity:1}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.1) rotate(160deg);opacity:0}}

  .modal{position:fixed;inset:0;z-index:50;display:none;place-items:center;
    background:rgba(40,50,90,.42);backdrop-filter:blur(6px);padding:24px;}
  .modal.open{display:grid;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .card{width:100%;max-width:340px;background:#fff;border-radius:28px;padding:26px 24px;text-align:center;
    box-shadow:0 30px 60px rgba(40,50,90,.35);animation:cardPop .3s cubic-bezier(.2,1.3,.4,1);}
  .card.shake{animation:shake .4s;}
  @keyframes cardPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
  .card h2{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--ink);margin-bottom:4px;}
  .card p{color:#6b5b8a;font-weight:700;margin-bottom:16px;font-size:15px;}
  .quiz{font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--purple);margin-bottom:14px;}
  .card input{width:100%;font-family:var(--font-display);font-weight:600;font-size:22px;text-align:center;
    padding:12px;border-radius:16px;border:2px solid #d9e6ff;outline:none;color:var(--ink);margin-bottom:16px;}
  .card input:focus{border-color:var(--purple);}
  .btn-row{display:flex;gap:10px;}
  .btn{flex:1;font-family:var(--font-display);font-weight:600;font-size:16px;padding:13px;border-radius:16px;border:none;cursor:pointer;transition:transform .12s ease;}
  .btn:active{transform:scale(.95);}
  .btn.primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 8px 18px rgba(150,90,220,.32);}
  .btn.ghost{background:#eef2fb;color:#5b6bb0;}
  .settings-note{display:none;margin-top:14px;font-weight:800;color:var(--grass-deep);font-size:14px;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;}
    .bubble{opacity:1;transform:translate(-50%,-100%) scale(1);}
    .petal{display:none;}
  }
</style>
</head>
<body>

  <svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#dcecf5"/></linearGradient>
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8fe08a"/><stop offset="1" stop-color="#5cbf6e"/></linearGradient>
  </defs></svg>

  <div class="scene" aria-hidden="true">
    <svg class="rays" viewBox="0 0 100 100"><g fill="#fff">
      <path d="M50 0 L54 40 L46 40 Z"/><path d="M100 50 L60 54 L60 46 Z"/><path d="M50 100 L46 60 L54 60 Z"/><path d="M0 50 L40 46 L40 54 Z"/>
      <path d="M85 15 L58 42 L52 36 Z"/><path d="M15 85 L42 58 L48 64 Z"/><path d="M85 85 L58 58 L64 52 Z"/><path d="M15 15 L42 42 L36 48 Z"/>
    </g></svg>
    <div class="sun"></div>
    <div class="backlight"></div>
    <svg class="rainbow" viewBox="0 0 200 110" aria-hidden="true"><g fill="none" stroke-width="7" stroke-linecap="round">
      <path d="M14 108 A86 86 0 0 1 186 108" stroke="#ff8fb0"/>
      <path d="M24 108 A76 76 0 0 1 176 108" stroke="#ffcf5c"/>

      <path d="M44 108 A56 56 0 0 1 156 108" stroke="#7ac6ff"/>
      <path d="M54 108 A46 46 0 0 1 146 108" stroke="#bb93ff"/>
    </g></svg>
    <div class="stars" id="stars"></div>

    <svg class="hills" viewBox="0 0 500 120" preserveAspectRatio="none">
      <path d="M0,120 Q120,40 250,80 T500,60 L500,120 Z" fill="#4fb8a8"/>
      <path d="M0,120 Q140,70 300,100 T500,88 L500,120 Z" fill="#3f9a8e"/>
    </svg>

    <svg class="cloud c1" viewBox="0 0 200 92"><g fill="url(#cloudGrad)"><ellipse cx="60" cy="55" rx="46" ry="30"/><ellipse cx="110" cy="46" rx="54" ry="34"/><ellipse cx="152" cy="58" rx="38" ry="26"/><rect x="40" y="58" width="132" height="28" rx="14"/></g><path d="M42 80 Q106 96 172 80" stroke="#d3e6f2" stroke-width="8" fill="none" stroke-linecap="round" opacity=".7"/></svg>
    <svg class="cloud c2" viewBox="0 0 200 92"><g fill="url(#cloudGrad)"><ellipse cx="70" cy="52" rx="44" ry="28"/><ellipse cx="122" cy="46" rx="48" ry="30"/><rect x="46" y="54" width="112" height="26" rx="13"/></g></svg>
    <svg class="cloud c3" viewBox="0 0 200 92"><g fill="url(#cloudGrad)"><ellipse cx="90" cy="50" rx="50" ry="30"/><ellipse cx="132" cy="56" rx="36" ry="24"/><rect x="55" y="56" width="102" height="24" rx="12"/></g></svg>

    <svg class="island" viewBox="0 0 130 120">
      <path d="M14 44 Q65 14 116 44 L104 66 Q65 84 26 66 Z" fill="url(#grassGrad)"/>
      <path d="M26 64 Q65 82 104 64 L92 90 Q65 104 38 90 Z" fill="#7a5a3a"/>
      <path d="M46 86 L60 116 L74 88 Q60 100 46 86" fill="#6b4a2f"/>
      <ellipse cx="65" cy="38" rx="50" ry="15" fill="#a3ef9d"/>
      <circle cx="46" cy="32" r="4" fill="#ff8fb0"/><circle cx="84" cy="34" r="4" fill="#ffcf5c"/>
      <path d="M100 34 l3 -14 l3 14" stroke="#ffcf5c" stroke-width="3" fill="none"/>
    </svg>

    <div class="petals" id="petals"></div>

    <svg class="ground" viewBox="0 0 500 160" preserveAspectRatio="none">
      <path d="M0,58 Q125,20 250,48 T500,42 L500,160 L0,160 Z" fill="#84d488"/>
      <path d="M0,84 Q140,54 280,80 T500,74 L500,160 L0,160 Z" fill="#54ba66"/>
      <g fill="#fff" opacity=".95">
        <circle cx="40" cy="118" r="5"/><circle cx="34" cy="112" r="4"/><circle cx="46" cy="112" r="4"/><circle cx="40" cy="124" r="4"/><circle cx="40" cy="118" r="3" fill="#ffcf5c"/>
        <circle cx="460" cy="126" r="5"/><circle cx="454" cy="120" r="4"/><circle cx="466" cy="120" r="4"/><circle cx="460" cy="132" r="4"/><circle cx="460" cy="126" r="3" fill="#ff8fb0"/>
      </g>
      <g stroke="#2f7b45" stroke-width="3" fill="none" stroke-linecap="round">
        <path d="M90 150 q-6 -20 4 -32"/><path d="M400 150 q8 -22 -4 -34"/><path d="M250 152 q-4 -18 6 -30"/>
      </g>
    </svg>
  </div>

  <div class="vignette" aria-hidden="true"></div>

  <div class="stage">
    <div class="topbar">
      <button class="gear" onclick="openParentGate()" aria-label="Grown-up settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>

    <!-- PARI: anime fairy with jewellery + designer gown -->
    <div class="pari-wrap" onclick="triggerPariSpeech()" role="button" aria-label="Pari">
      <div class="bubble" id="bubble"></div>
      <div class="pari-float">
        <svg class="pari-svg" viewBox="0 0 260 320">
          <defs>
            <linearGradient id="hairGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffa8d8"/><stop offset="1" stop-color="#b184ee"/></linearGradient>
            <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe7d6"/><stop offset="1" stop-color="#ffd2b8"/></linearGradient>
            <linearGradient id="dressGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff9ec6"/><stop offset="1" stop-color="#c39bf0"/></linearGradient>
            <linearGradient id="irisGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4a2fb0"/><stop offset=".55" stop-color="#7a5fe0"/><stop offset="1" stop-color="#bda4ff"/></linearGradient>
            <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c6f0ff"/><stop offset=".5" stop-color="#ffc9ef"/><stop offset="1" stop-color="#e6d5ff"/></linearGradient>
            <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe89a"/><stop offset="1" stop-color="#ffb01f"/></linearGradient>
            <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffffff" stop-opacity=".85"/><stop offset="42%" stop-color="#ffe6a0" stop-opacity=".45"/><stop offset="100%" stop-color="#ffd6ec" stop-opacity="0"/></radialGradient>
          </defs>

          <circle class="aura" cx="130" cy="168" r="122" fill="url(#auraGrad)"/>

      </div>

<script>
  (function seedScene(){
    const stars=document.getElementById('stars');
    for(let i=0;i<34;i++){const s=document.createElement('div');s.className='star';const sz=1+Math.random()*2.4;
      s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*55}%;width:${sz}px;height:${sz}px;animation-delay:${(Math.random()*5).toFixed(2)}s;animation-duration:${(4+Math.random()*3).toFixed(2)}s;`;stars.appendChild(s);}
    const p=document.getElementById('petals');
    for(let i=0;i<14;i++){const el=document.createElement('div');el.className='petal';
      el.style.cssText=`left:${Math.random()*100}%;--drift:${(Math.random()*80-30).toFixed(0)}px;animation-duration:${(13+Math.random()*8).toFixed(1)}s;animation-delay:${(Math.random()*14).toFixed(1)}s;transform:scale(${(.7+Math.random()*.6).toFixed(2)});`;p.appendChild(el);}
  })();

  const EMOJI=['✨','⭐','💫','🌟','💛'];
  function sparkleBurst(x,y,n=12){for(let i=0;i<n;i++){const s=document.createElement('div');s.className='sparkle';
    s.textContent=EMOJI[Math.floor(Math.random()*EMOJI.length)];
    const ang=Math.random()*Math.PI*2,dist=50+Math.random()*90;
    s.style.left=x+'px';s.style.top=y+'px';
    s.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(0)+'px');
    s.style.setProperty('--dy',(Math.sin(ang)*dist).toFixed(0)+'px');
    s.style.fontSize=(14+Math.random()*16)+'px';
    document.body.appendChild(s);s.addEventListener('animationend',()=>s.remove());}}
  function burstAt(el){const r=el.getBoundingClientRect();sparkleBurst(r.left+r.width/2,r.top+r.height/2);}

  let bubbleTimer;
  function say(text,ms=6000){const b=document.getElementById('bubble');b.textContent=text;
    b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
    clearTimeout(bubbleTimer);bubbleTimer=setTimeout(()=>b.classList.remove('show'),ms);}

  let hasSpoken=false;
  function speak(text){if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.pitch=1.4;u.rate=.95;u.onstart=()=>{hasSpoken=true;};window.speechSynthesis.speak(u);}

  const WELCOME_VOICE="Hi Shubh! Welcome to your magic world! Tap the big camera button and take a photo of your textbook page, and let's play!";
  const WELCOME_BUBBLE="Hi Shubh! 🌟 Tap the big camera and snap a photo of your textbook page — let's play!";
  function greet(){say(WELCOME_BUBBLE,7000);speak(WELCOME_VOICE);}

  function triggerPariSpeech(){greet();burstAt(document.querySelector('.pari-svg'));}
  function scanBook(){const flash=document.getElementById('flash');flash.classList.remove('go');void flash.offsetWidth;flash.classList.add('go');
    burstAt(document.querySelector('.cam-body'));
    say("Click! Point me at your book page and I'll bring it to life! 📖");
    speak("Click! Point me at your book page, and I will bring it to life!");}

  let gateAnswer=7;
  function openParentGate(){const a=2+Math.floor(Math.random()*6),b=2+Math.floor(Math.random()*6);gateAnswer=a+b;
    document.getElementById('quiz').textContent=`${a} + ${b} = ?`;document.getElementById('answer').value='';
    document.getElementById('settingsNote').style.display='none';document.getElementById('modal').classList.add('open');
    setTimeout(()=>document.getElementById('answer').focus(),200);}
  function closeModal(){document.getElementById('modal').classList.remove('open');}
  function checkGate(){const val=parseInt(document.getElementById('answer').value,10);
    if(val===gateAnswer){document.getElementById('settingsNote').style.display='block';burstAt(document.getElementById('card'));}
    else{const card=document.getElementById('card');card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');document.getElementById('answer').value='';}}
  document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

  window.addEventListener('load',()=>{setTimeout(greet,700);});
  const kick=()=>{if(!hasSpoken)speak(WELCOME_VOICE);
    window.removeEventListener('pointerdown',kick);window.removeEventListener('touchstart',kick);window.removeEventListener('keydown',kick);};
  window.addEventListener('pointerdown',kick);window.addEventListener('touchstart',kick);window.addEventListener('keydown',kick);
</script>
